<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanSetu — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #f97316;
            --accent-dark: #c2410c;
            --green: #16a34a;
            --green-dark: #15803d;
            --text-main: #1a1a1a;
            --text-sub: #6b7280;
            --card-bg: #fff;
            --body-bg: #f0f4f0;
        }
        *, *:before, *:after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Open Sans', sans-serif;
            background: var(--body-bg);
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        input, button { border: none; outline: none; background: none; font-family: 'Open Sans', sans-serif; }

        /* LANGUAGE BAR */
        .lang-bar {
            position: fixed; top: 18px; right: 30px;
            display: flex; align-items: center; gap: 8px; z-index: 100;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
            border: 1px solid rgba(249,115,22,0.25); border-radius: 30px;
            padding: 5px 12px 5px 8px;
            box-shadow: 0 2px 12px rgba(249,115,22,0.1);
        }
        .lang-arrow {
            width: 24px; height: 24px; border-radius: 50%;
            background: var(--accent); color: #fff; font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none;
            transition: background 0.2s, transform 0.15s;
        }
        .lang-arrow:hover { background: var(--accent-dark); transform: scale(1.12); }
        .lang-label {
            font-size: 12px; font-weight: 600; letter-spacing: 0.08em;
            color: var(--text-main); min-width: 90px; text-align: center;
            text-transform: uppercase; overflow: hidden; position: relative; height: 18px;
        }
        .lang-label span { display: block; transition: opacity 0.25s, transform 0.25s; position: absolute; width: 100%; left: 0; }
        .lang-label span.lang-out-left  { opacity: 0; transform: translateX(-16px); }
        .lang-label span.lang-out-right { opacity: 0; transform: translateX(16px); }
        .lang-label span.lang-active    { opacity: 1; transform: translateX(0); }

        /* CARD */
        .cont {
            border-radius: 20px; overflow: hidden; position: relative;
            width: 900px; height: 560px; background: var(--card-bg);
            box-shadow: 0 8px 40px rgba(0,0,0,0.14);
        }

        /* FORMS */
        .form {
            position: relative; width: 640px; height: 100%;
            transition: transform 1.2s ease-in-out;
            padding: 24px 40px 0;
            display: flex; flex-direction: column; align-items: center;
            overflow-y: auto;
        }
        .sign-in { transition-timing-function: ease-out; }
        .cont.s--signup .sign-in {
            transition-timing-function: ease-in-out;
            transition-duration: 1.2s;
            transform: translate3d(640px, 0, 0);
        }
        .sign-up {
            transform: translate3d(-900px, 0, 0);
            visibility: hidden; opacity: 0;
            transition: transform 1.2s ease-in-out, visibility 0s linear 1.2s, opacity 0s linear 1.2s;
        }
        .cont.s--signup .sign-up {
            transform: translate3d(0, 0, 0);
            visibility: visible; opacity: 1;
            transition: transform 1.2s ease-in-out, visibility 0s linear 0s, opacity 0s linear 0s;
        }

        /* SUB CONT */
        .sub-cont {
            overflow: hidden; position: absolute; left: 640px; top: 0;
            width: 900px; height: 100%; padding-left: 260px;
            background: var(--card-bg);
            transition: transform 1.2s ease-in-out;
        }
        .cont.s--signup .sub-cont { transform: translate3d(-640px, 0, 0); }

        /* FORM HEADING */
        h2 {
            width: 100%; font-size: 22px; text-align: center;
            font-family: 'Cormorant Garamond', serif; font-weight: 500;
            letter-spacing: 0.04em; color: var(--text-main);
            margin-bottom: 4px;
        }

        /* LOGO WRAP */
        .logo-wrap {
            display: flex; flex-direction: column; align-items: center;
            margin-top: 6px; margin-bottom: 8px; gap: 2px;
        }
        .logo-round {
            width: 72px; height: 72px; border-radius: 50%;
            object-fit: cover; object-position: center;
            border: none;
            box-shadow: 0 2px 14px rgba(0,0,0,0.12);
        }
        .logo-name {
            font-size: 17px; font-weight: 700; letter-spacing: 0.04em;
        }
        .logo-name .jan { color: #f97316; }
        .logo-name .setu { color: #16a34a; }
        .logo-tagline { font-size: 9.5px; letter-spacing: 0.14em; color: var(--text-sub); text-transform: uppercase; }

        /* INPUTS */
        label { display: block; width: 280px; margin: 10px auto 0; text-align: center; }
        label span { font-size: 10px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.14em; }
        input {
            display: block; width: 100%; margin-top: 4px; padding-bottom: 5px;
            font-size: 14px; border-bottom: 1.5px solid rgba(249,115,22,0.2);
            text-align: center; color: var(--text-main); transition: border-color 0.2s;
        }
        input:focus { border-bottom-color: var(--accent); }

        .forgot-pass {
            margin-top: 8px; text-align: center; font-size: 11.5px;
            color: #9ca3af; cursor: pointer; transition: color 0.2s;
        }
        .forgot-pass:hover { color: var(--green); }

        /* MAIN BUTTON */
        .submit {
            display: block; margin: 12px auto 0; width: 240px; height: 38px;
            border-radius: 30px; color: #fff; font-size: 12.5px; cursor: pointer;
            background: linear-gradient(135deg, #f97316, #ea580c);
            text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700;
            box-shadow: 0 4px 14px rgba(249,115,22,0.3);
            transition: background 0.3s, transform 0.2s, box-shadow 0.2s;
            border: none;
        }
        .submit:hover {
            background: linear-gradient(135deg, #16a34a, #15803d);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(22,163,74,0.35);
        }

        /* OR DIVIDER */
        .divider-or {
            display: flex; align-items: center; gap: 10px;
            width: 240px; margin: 10px auto 0;
        }
        .divider-or hr { flex: 1; border: none; border-top: 1px solid #e5e7eb; }
        .divider-or span { font-size: 10.5px; color: #9ca3af; letter-spacing: 0.1em; }

        /* SOCIAL BUTTONS */
        .social-btns {
            display: flex; gap: 10px; justify-content: center;
            margin-top: 8px; width: 100%;
        }
        .social-btn {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            width: 115px; height: 36px; border-radius: 30px;
            font-size: 11.5px; font-weight: 600; cursor: pointer;
            border: 1.5px solid #e5e7eb; background: #fff;
            color: #374151; letter-spacing: 0.02em;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.18s;
        }
        .social-btn:hover {
            border-color: var(--green);
            box-shadow: 0 3px 12px rgba(22,163,74,0.18);
            transform: translateY(-2px);
        }

        /* LEFT IMAGE PANEL */
        .img {
            overflow: hidden; z-index: 2; position: absolute;
            left: 0; top: 0; width: 260px; height: 100%;
        }

        .img:after {
            content: ''; position: absolute; left: 0; top: 0;
            width: 100%; height: 100%;
            background: linear-gradient(160deg, rgba(5,30,5,0.68) 0%, rgba(20,70,20,0.52) 100%);
        }
        .cont.s--signup .img:before { transform: translate3d(640px, 0, 0); }

        /* PANEL CONTENT - stacked in flex column */
        .panel-inner {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px; padding: 20px 16px;
        }
        .panel-text { width: 100%; }
        .panel-up, .panel-in { position: absolute; left: 0; width: 100%; padding: 0 16px; }

        .panel-logo-img {
            width: 68px; height: 68px; border-radius: 50%;
            object-fit: cover; object-position: center;
            border: none;
            box-shadow: 0 3px 16px rgba(0,0,0,0.3);
            margin-bottom: 6px;
        }
        .panel-logo-name {
            font-size: 15px; font-weight: 700; letter-spacing: 0.06em;
        }
        .panel-logo-name .jan { color: #fbbf24; }
        .panel-logo-name .setu { color: #86efac; }
        .panel-tagline {
            font-size: 9px; color: rgba(255,255,255,0.7);
            letter-spacing: 0.1em; text-align: center;
            margin-bottom: 14px; margin-top: 2px;
        }
        .panel-divider { width: 30px; height: 1px; background: rgba(255,255,255,0.35); margin-bottom: 14px; }

        /* Panel text blocks - toggled via JS */
        .panel-text { text-align: center; color: #fff; }
        .panel-text h2 {
            font-family: 'Cormorant Garamond', serif; font-size: 19px;
            font-weight: 400; color: #fff; margin-bottom: 7px;
        }
        .panel-text p { font-size: 12px; line-height: 1.6; color: rgba(255,255,255,0.8); }

        /* Panel toggle btn */
        .img__btn {
            overflow: hidden; z-index: 2; position: relative;
            width: 115px; height: 34px; margin-top: 16px;
            background: transparent; color: #fff;
            text-transform: uppercase; font-size: 11.5px; letter-spacing: 0.12em; cursor: pointer;
            border: none;
        }
        .img__btn:after {
            content: ''; z-index: 2; position: absolute;
            left: 0; top: 0; width: 100%; height: 100%;
            border: 2px solid rgba(255,255,255,0.75); border-radius: 30px;
            transition: border-color 0.25s, background 0.25s;
        }
        .img__btn:hover:after { border-color: #4ade80; background: rgba(74,222,128,0.15); }
        .img__btn span {
            position: absolute; left: 0; top: 0;
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%; transition: transform 1.2s;
        }
        .img__btn span.m--in { transform: translateY(-68px); }
        .cont.s--signup .img__btn span.m--in { transform: translateY(0); }
        .cont.s--signup .img__btn span.m--up { transform: translateY(68px); }

        /* Panel text slide transitions */
        .panel-texts-wrap {
            position: relative;
            width: 100%;
            height: 110px;
            overflow: hidden;
        }
        .panel-up, .panel-in {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            text-align: center;
            padding: 0 8px;
        }
        .panel-up { transition: transform 1.2s ease-in-out, opacity 0.6s; opacity: 1; transform: translateX(0); }
        .panel-in { transform: translateX(-280px); opacity: 0; transition: transform 1.2s ease-in-out, opacity 0.6s; }
        .cont.s--signup .panel-up { transform: translateX(280px); opacity: 0; }
        .cont.s--signup .panel-in { transform: translateX(0); opacity: 1; }
    </style>

    <script>
        // PANEL TOGGLE
        document.querySelector('.img__btn').addEventListener('click', function() {
            document.querySelector('.cont').classList.toggle('s--signup');
        });

        // LANGUAGE DATA
        const languages = [
            { name: 'English', t: { welcomeTitle:'Welcome Back', createTitle:'Create Account', labelEmail:'Email', labelEmail2:'Email', labelPassword:'Password', labelName:'Name', labelPass2:'Password', labelConfirm:'Confirm Password', forgotText:'Forgot password?', signinBtn:'Sign In', signupBtn:'Sign Up', panelSignupTitle:'New here?', panelSignupText:'Create an account and start your journey with us today.', panelSigninTitle:'Welcome back!', panelSigninText:'Already have an account? Sign in to continue.', btnSignup:'Sign Up', btnSignin:'Sign In' }},
            { name: 'हिन्दी', t: { welcomeTitle:'वापस स्वागत है', createTitle:'खाता बनाएं', labelEmail:'ईमेल', labelEmail2:'ईमेल', labelPassword:'पासवर्ड', labelName:'नाम', labelPass2:'पासवर्ड', labelConfirm:'पुष्टि करें', forgotText:'पासवर्ड भूल गए?', signinBtn:'साइन इन', signupBtn:'साइन अप', panelSignupTitle:'नए हैं?', panelSignupText:'खाता बनाएं और हमारे साथ अपनी यात्रा शुरू करें।', panelSigninTitle:'वापसी पर स्वागत!', panelSigninText:'पहले से खाता है? साइन इन करें।', btnSignup:'साइन अप', btnSignin:'साइन इन' }},
            { name: 'বাংলা', t: { welcomeTitle:'স্বাগতম', createTitle:'অ্যাকাউন্ট তৈরি করুন', labelEmail:'ইমেইল', labelEmail2:'ইমেইল', labelPassword:'পাসওয়ার্ড', labelName:'নাম', labelPass2:'পাসওয়ার্ড', labelConfirm:'নিশ্চিত করুন', forgotText:'পাসওয়ার্ড ভুলে গেছেন?', signinBtn:'সাইন ইন', signupBtn:'সাইন আপ', panelSignupTitle:'নতুন এখানে?', panelSignupText:'একটি অ্যাকাউন্ট তৈরি করুন এবং আজই আমাদের সাথে যোগ দিন।', panelSigninTitle:'আবার স্বাগতম!', panelSigninText:'ইতিমধ্যে অ্যাকাউন্ট আছে? সাইন ইন করুন।', btnSignup:'সাইন আপ', btnSignin:'সাইন ইন' }},
        ];
        let currentLang = 0;

        function applyLanguage(t) {
            document.getElementById('welcome-title').textContent = t.welcomeTitle;
            document.getElementById('create-title').textContent = t.createTitle;
            document.getElementById('label-email').textContent = t.labelEmail;
            document.getElementById('label-email2').textContent = t.labelEmail2;
            document.getElementById('label-password').textContent = t.labelPassword;
            document.getElementById('label-name').textContent = t.labelName;
            document.getElementById('label-pass2').textContent = t.labelPass2;
            document.getElementById('label-confirm').textContent = t.labelConfirm;
            document.getElementById('forgot-text').textContent = t.forgotText;
            document.getElementById('signin-btn').textContent = t.signinBtn;
            document.getElementById('signup-btn').textContent = t.signupBtn;
            document.getElementById('panel-signup-title').textContent = t.panelSignupTitle;
            document.getElementById('panel-signup-text').textContent = t.panelSignupText;
            document.getElementById('panel-signin-title').textContent = t.panelSigninTitle;
            document.getElementById('panel-signin-text').textContent = t.panelSigninText;
            document.getElementById('btn-signup-label').textContent = t.btnSignup;
            document.getElementById('btn-signin-label').textContent = t.btnSignin;
        }

        function switchLang(dir) {
            const oldSpan = document.getElementById('lang-text');
            oldSpan.className = dir > 0 ? 'lang-out-left' : 'lang-out-right';
            currentLang = (currentLang + dir + languages.length) % languages.length;
            const lang = languages[currentLang];
            setTimeout(() => {
                oldSpan.textContent = lang.name;
                oldSpan.className = dir > 0 ? 'lang-out-right' : 'lang-out-left';
                void oldSpan.offsetWidth;
                oldSpan.className = 'lang-active';
                applyLanguage(lang.t);
            }, 140);
        }

        document.getElementById('lang-prev').addEventListener('click', () => switchLang(-1));
        document.getElementById('lang-next').addEventListener('click', () => switchLang(1));
    </script>
